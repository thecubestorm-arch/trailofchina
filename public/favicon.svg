<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#af5d32"/>
  
  <!-- Pagoda roof - top tier -->
  <path d="M8 10 L16 6 L24 10" fill="none" stroke="#f5f1ea" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Top ornament -->
  <circle cx="16" cy="5" r="0.8" fill="#f5f1ea"/>
  
  <!-- Pagoda roof - eaves detail top -->
  <path d="M7 10.5 L25 10.5" stroke="#f5f1ea" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Pagoda roof - middle tier -->
  <path d="M6 15 L16 11 L26 15" fill="none" stroke="#f5f1ea" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M5.5 15.5 L26.5 15.5" stroke="#f5f1ea" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Pagoda body -->
  <path d="M12 15.5 L12 22 L20 22 L20 15.5" fill="none" stroke="#f5f1ea" stroke-width="1.2" stroke-linejoin="round"/>
  
  <!-- Door -->
  <path d="M14.5 22 L14.5 18.5 Q14.5 17 16 17 Q17.5 17 17.5 18.5 L17.5 22" fill="none" stroke="#f5f1ea" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Base -->
  <path d="M10 22 L22 22" stroke="#f5f1ea" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M8 23.5 L24 23.5" stroke="#f5f1ea" stroke-width="1" stroke-linecap="round"/>
</svg>